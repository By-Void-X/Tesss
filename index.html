<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ByVoid - Dashboard</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- GSAP & AOS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Particle Background -->
    <canvas id="particleCanvas"></canvas>

    <!-- Main App -->
    <div id="app">

        <!-- ========== HEADER ========== -->
        <header>
            <div class="logo" data-aos="fade-down" data-aos-duration="1000">
                <h1>ByVoid</h1>
                <span class="glow-line"></span>
            </div>
            <div class="header-right">
                <span class="status-badge"><i class="fas fa-circle"></i> ONLINE</span>
                <span class="version">v3.0</span>
            </div>
        </header>

        <!-- ========== CONTENT ========== -->
        <main id="mainContent">

            <!-- HOME -->
            <section id="pageHome" class="page active">
                <!-- Video Card -->
                <div class="card video-card" data-aos="fade-up" data-aos-duration="800">
                    <div class="card-header">
                        <h2><i class="fas fa-video"></i> Video</h2>
                    </div>
                    <div class="video-wrapper">
                        <video id="videoPlayer" controls poster="https://via.placeholder.com/640x360/0a0a1a/00bfff?text=ByVoid">
                            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
                        </video>
                        <div class="video-controls">
                            <button id="playBtn"><i class="fas fa-play"></i></button>
                            <button id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Connected Devices -->
                <div class="card" data-aos="fade-up" data-aos-duration="800" data-aos-delay="200">
                    <div class="card-header">
                        <h2><i class="fas fa-link"></i> Connected Devices</h2>
                        <span class="badge" id="deviceCount">3</span>
                    </div>
                    <div class="device-grid" id="deviceGrid">
                        <!-- Dinamis dari JS -->
                    </div>
                </div>
            </section>

            <!-- DEVICE -->
            <section id="pageDevice" class="page">
                <div class="card" data-aos="fade-up">
                    <div class="card-header">
                        <h2><i class="fas fa-search"></i> Search Devices</h2>
                    </div>
                    <input type="text" id="searchDevice" placeholder="Cari device..." class="search-input" />
                    <div class="device-grid" id="deviceGridAll"></div>
                </div>
            </section>

            <!-- CONTROL -->
            <section id="pageControl" class="page">
                <div class="card glass" data-aos="fade-up">
                    <div class="card-header">
                        <h2><i class="fas fa-gamepad"></i> Control Panel</h2>
                    </div>
                    <div class="control-grid">
                        <div class="control-item"><button class="ctrl-btn lock"><i class="fas fa-lock"></i> Lock</button></div>
                        <div class="control-item"><button class="ctrl-btn ping"><i class="fas fa-wifi"></i> Ping</button></div>
                        <div class="control-item"><button class="ctrl-btn screenshot"><i class="fas fa-camera"></i> Screenshot</button></div>
                        <div class="control-item"><button class="ctrl-btn camera"><i class="fas fa-video"></i> Camera</button></div>
                    </div>
                    <div class="toggle-grid">
                        <div class="toggle-item"><span>Live Stream</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                        <div class="toggle-item"><span>Record</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                    </div>
                </div>
            </section>

            <!-- MONITOR -->
            <section id="pageMonitor" class="page">
                <div class="card" data-aos="fade-up">
                    <div class="card-header">
                        <h2><i class="fas fa-chart-line"></i> Realtime Monitor</h2>
                    </div>
                    <div class="chart-grid">
                        <div class="chart-item"><canvas id="cpuChart"></canvas><p>CPU</p></div>
                        <div class="chart-item"><canvas id="ramChart"></canvas><p>RAM</p></div>
                        <div class="chart-item"><canvas id="batteryChart"></canvas><p>Battery</p></div>
                    </div>
                </div>
            </section>

        </main>

        <!-- ========== BOTTOM NAV ========== -->
        <nav id="bottomNav">
            <div class="nav-item active" data-page="pageHome"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="nav-item" data-page="pageDevice"><i class="fas fa-tablet"></i><span>Device</span></div>
            <div class="nav-item" data-page="pageControl"><i class="fas fa-joystick"></i><span>Control</span></div>
            <div class="nav-item" data-page="pageMonitor"><i class="fas fa-chart-simple"></i><span>Monitor</span></div>
            <div class="nav-indicator"></div>
        </nav>

    </div>

    <script src="script.js"></script>
</body>
</html>
